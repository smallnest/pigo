<rect width="100%" height="100%" fill="#f8fafc" />

        <title id="archify-diagram-title">两层循环：一次 run 的事件骨架</title>
        <desc id="archify-diagram-description">内层 turn 流式回复→执行工具→回填，外层判定要不要续跑；多条路径汇于唯一出口</desc>
