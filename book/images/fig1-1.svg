<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="800" viewBox="0 0 1180 800" font-family="Helvetica, Arial, 'Liberation Sans', sans-serif">
  <title>pigo Runtime Architecture</title>
  <desc>pigo high-level runtime architecture: request path from user through CLI, agent loop, provider layer to the LLM gateway; tool path from the loop through the tool executor and trust gate to the local environment; support edges to session store and context compaction; trust and external-network boundaries.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111111"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a1f1f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="800" fill="#ffffff"/>

  <!-- ===== Boundaries (behind nodes) ===== -->
  <rect x="138" y="58" width="744" height="560" rx="14" ry="14" fill="#fafafa" stroke="#333333" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="156" y="82" font-size="14" font-weight="bold" fill="#333333">pigo 进程 · 本地可信边界 (local, trusted)</text>

  <rect x="938" y="225" width="218" height="262" rx="14" ry="14" fill="#f4f4f4" stroke="#8a1f1f" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="952" y="248" font-size="13" font-weight="bold" fill="#8a1f1f">外部网络 · 不可信 (untrusted)</text>

  <!-- ===== Connections ===== -->
  <!-- main request path (solid black, thick) -->
  <line x1="145" y1="280" x2="223" y2="280" stroke="#111111" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="385" y1="280" x2="468" y2="280" stroke="#111111" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="630" y1="280" x2="713" y2="280" stroke="#111111" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="865" y1="280" x2="953" y2="280" stroke="#111111" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- tool path (down from loop) -->
  <line x1="550" y1="310" x2="550" y2="408" stroke="#111111" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- support edges (gray) -->
  <line x1="305" y1="250" x2="305" y2="146" stroke="#555555" stroke-width="1.3" marker-end="url(#arrowGray)"/>
  <line x1="550" y1="250" x2="550" y2="146" stroke="#555555" stroke-width="1.3" marker-end="url(#arrowGray)"/>
  <!-- spawn (dashed) -->
  <line x1="468" y1="440" x2="332" y2="440" stroke="#555555" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>
  <!-- webfetch (dashed, crosses external boundary) -->
  <line x1="632" y1="440" x2="953" y2="440" stroke="#555555" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>

  <!-- security edges (dark red, solid) -->
  <line x1="550" y1="470" x2="550" y2="533" stroke="#8a1f1f" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <line x1="550" y1="589" x2="550" y2="653" stroke="#8a1f1f" stroke-width="1.8" marker-end="url(#arrowRed)"/>

  <!-- ===== Connection labels ===== -->
  <g font-size="11" fill="#222222">
    <text x="184" y="273" text-anchor="middle">prompt · flags</text>
    <text x="426" y="273" text-anchor="middle">run config</text>
    <text x="671" y="273" text-anchor="middle">completion req</text>
    <text x="909" y="273" text-anchor="middle">HTTPS · SSE</text>
    <text x="560" y="365" text-anchor="start">tool calls</text>
    <text x="400" y="432" text-anchor="middle">spawn</text>
    <text x="792" y="432" text-anchor="middle">webfetch</text>
  </g>
  <g font-size="11" fill="#555555">
    <text x="315" y="202" text-anchor="start">persist · resume</text>
    <text x="560" y="202" text-anchor="start">auto-summary</text>
  </g>
  <g font-size="11" fill="#8a1f1f">
    <text x="560" y="508" text-anchor="start">gate side effects</text>
    <text x="560" y="628" text-anchor="start">read/write/exec</text>
  </g>
  <!-- ===== Nodes ===== -->
  <!-- external nodes -->
  <g>
    <rect x="15" y="250" width="130" height="60" rx="8" fill="#ececec" stroke="#333333" stroke-width="1.4"/>
    <text x="80" y="277" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#111111">User / Terminal</text>
    <text x="80" y="295" text-anchor="middle" font-size="10" fill="#555555">REPL · -p headless</text>
  </g>
  <g>
    <rect x="955" y="250" width="185" height="60" rx="8" fill="#ececec" stroke="#8a1f1f" stroke-width="1.6"/>
    <text x="1047" y="273" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#111111">LLM Gateway</text>
    <text x="1047" y="290" text-anchor="middle" font-size="10" fill="#555555">OpenRouter · Anthropic</text>
    <text x="1047" y="303" text-anchor="middle" font-size="10" fill="#555555">Ollama</text>
  </g>
  <g>
    <rect x="955" y="410" width="150" height="60" rx="8" fill="#ececec" stroke="#8a1f1f" stroke-width="1.6"/>
    <text x="1030" y="437" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#111111">Web</text>
    <text x="1030" y="455" text-anchor="middle" font-size="10" fill="#555555">webfetch targets</text>
  </g>

  <!-- support nodes -->
  <g>
    <rect x="225" y="92" width="160" height="54" rx="8" fill="#f2f6f7" stroke="#333333" stroke-width="1.2"/>
    <text x="305" y="116" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#111111">Session Store</text>
    <text x="305" y="133" text-anchor="middle" font-size="10" fill="#555555">JSONL · resume</text>
  </g>
  <g>
    <rect x="470" y="92" width="160" height="54" rx="8" fill="#f2f6f7" stroke="#333333" stroke-width="1.2"/>
    <text x="550" y="116" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#111111">Context Compaction</text>
    <text x="550" y="133" text-anchor="middle" font-size="10" fill="#555555">auto-summary</text>
  </g>

  <!-- core backend nodes -->
  <g>
    <rect x="225" y="250" width="160" height="60" rx="8" fill="#ffffff" stroke="#111111" stroke-width="1.6"/>
    <text x="305" y="277" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#111111">CLI &amp; Run Assembly</text>
    <text x="305" y="295" text-anchor="middle" font-size="10" fill="#555555">cmd/pigo</text>
  </g>
  <g>
    <rect x="470" y="250" width="160" height="60" rx="8" fill="#ffffff" stroke="#111111" stroke-width="1.6"/>
    <text x="550" y="277" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#111111">Agent Loop</text>
    <text x="550" y="295" text-anchor="middle" font-size="10" fill="#555555">runtime · two-layer</text>
  </g>
  <g>
    <rect x="715" y="250" width="150" height="60" rx="8" fill="#ffffff" stroke="#111111" stroke-width="1.6"/>
    <text x="790" y="277" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#111111">Provider Layer</text>
    <text x="790" y="295" text-anchor="middle" font-size="10" fill="#555555">transport · SSE</text>
  </g>
  <g>
    <rect x="155" y="410" width="175" height="60" rx="8" fill="#ffffff" stroke="#111111" stroke-width="1.6"/>
    <text x="242" y="435" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#111111">Sub-agent Orchestrator</text>
    <text x="242" y="453" text-anchor="middle" font-size="10" fill="#555555">goroutine · process</text>
  </g>
  <g>
    <rect x="470" y="410" width="160" height="60" rx="8" fill="#ffffff" stroke="#111111" stroke-width="1.6"/>
    <text x="550" y="435" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#111111">Tool Executor</text>
    <text x="550" y="453" text-anchor="middle" font-size="10" fill="#555555">registry · read/edit/bash</text>
  </g>

  <!-- security node -->
  <g>
    <rect x="470" y="533" width="160" height="56" rx="8" fill="#fbf1f1" stroke="#8a1f1f" stroke-width="1.8"/>
    <text x="550" y="558" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8a1f1f">Trust Gate</text>
    <text x="550" y="575" text-anchor="middle" font-size="10" fill="#8a1f1f">per-dir permission</text>
  </g>

  <!-- local environment -->
  <g>
    <rect x="470" y="653" width="160" height="56" rx="8" fill="#ececec" stroke="#333333" stroke-width="1.4"/>
    <text x="550" y="678" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#111111">Local FS &amp; Shell</text>
    <text x="550" y="695" text-anchor="middle" font-size="10" fill="#555555">files · commands</text>
  </g>

  <!-- ===== Legend ===== -->
  <g font-size="11" fill="#333333">
    <line x1="700" y1="648" x2="738" y2="648" stroke="#111111" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="746" y="652" text-anchor="start">主请求路径</text>
    <line x1="700" y1="672" x2="738" y2="672" stroke="#555555" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>
    <text x="746" y="676" text-anchor="start">异步 / 可选调用</text>
    <line x1="700" y1="696" x2="738" y2="696" stroke="#8a1f1f" stroke-width="1.8" marker-end="url(#arrowRed)"/>
    <text x="746" y="700" text-anchor="start">受信任门控的副作用</text>
  </g>
</svg>
